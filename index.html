<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인테리어 견적 계산기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>인테리어 견적 계산기</h1>
      <p class="sub">항목 선택 후 수량 입력 → 자동 견적 계산 (총 11개 카테고리)</p>
    </div>

    <div class="area-row">
      <label for="pyung">평수</label>
      <input type="number" id="pyung" value="32" min="1" max="200" step="1">
      <span>평형</span>
      <span id="sqm" class="sqm-text"></span>
      <span class="badge">평(평당) 단위 항목 수량 자동 적용</span>
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="content"></div>

    <div class="summary">
      <div class="summary-header">
        <span class="summary-title">견적 요약</span>
        <button class="btn-reset" id="btn-reset">초기화</button>
      </div>
      <div class="sgrid" id="scards"></div>
      <div class="srows" id="srows"></div>
      <p class="note">* 부가세 별도 / 실제 견적은 현장 방문 후 변동 가능 / 평(평당) 단위 항목은 평수 자동 반영</p>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
